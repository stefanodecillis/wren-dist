# Wren backend — self-hosted, using the prebuilt public image.
#
# Local / personal-LAN use over plain HTTP (there is NO TLS). Do not expose port 8080 to the
# public internet directly; put it behind your own reverse proxy + TLS if you must.
#
#   1. cp .env.example .env   &&   fill in the secrets (see comments in .env.example)
#   2. docker compose up -d
#   3. open http://localhost:8080/health
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wren}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wren}
      POSTGRES_DB: ${POSTGRES_DB:-wren}
    volumes:
      - wren_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wren}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - wren_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/stefanodecillis/wren-backend:latest
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      # Reach the compose services regardless of what's in .env.
      DATABASE_URL: postgresql://${POSTGRES_USER:-wren}:${POSTGRES_PASSWORD:-wren}@postgres:5432/${POSTGRES_DB:-wren}?schema=public
      REDIS_URL: redis://redis:6379
      # Capture the Codex "Sign in with ChatGPT" OAuth redirect through the published 1455 port.
      CODEX_CALLBACK_BIND: 0.0.0.0
    ports:
      - "8080:8080"
      - "1455:1455"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  wren_pg:
  wren_redis:
